<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DW / STG Viewer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.20.0.min.js"></script>
  </head>
  <body>
    <div class="container my-4">
      <h2>DW / STG Viewer</h2>
      <ul class="nav nav-tabs" id="tabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="dash-tab" data-bs-toggle="tab" data-bs-target="#dash" type="button" role="tab">Dashboard</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="sql-tab" data-bs-toggle="tab" data-bs-target="#sql" type="button" role="tab">SQL Explorer</button>
        </li>
      </ul>
      <div class="tab-content mt-3">
        <div class="tab-pane fade show active" id="dash" role="tabpanel">
          <div class="row">
            <div class="col-md-4">
              <div class="card p-2">
                <div class="mb-2">
                  <label for="dbSelect">Base</label>
                  <select id="dbSelect" class="form-select">
                    <option value="stg">Staging</option>
                    <option value="dwh">Data Warehouse</option>
                  </select>
                </div>
                <div class="mb-2">
                  <label for="tableSelect">Tabla</label>
                  <select id="tableSelect" class="form-select"></select>
                </div>
                <div class="mb-2">
                  <label for="xSelect">Eje X</label>
                  <select id="xSelect" class="form-select"></select>
                </div>
                <div class="mb-2">
                  <label for="ySelect">Eje Y (opcional)</label>
                  <select id="ySelect" class="form-select"><option value="">-- count por X --</option></select>
                </div>
                <div class="mb-2">
                  <label for="chartType">Tipo de gráfico</label>
                  <select id="chartType" class="form-select">
                    <option value="bar">Bar</option>
                    <option value="pie">Pie</option>
                    <option value="line">Line</option>
                  </select>
                </div>
                <div class="d-grid">
                  <button id="renderBtn" class="btn btn-primary">Render</button>
                </div>
              </div>
            </div>
            <div class="col-md-8">
              <div id="chart" style="width:100%;height:450px"></div>
              <hr>
              <div>
                <h6>Preview de datos (primeros 50 registros)</h6>
                <div id="preview"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="tab-pane fade" id="sql" role="tabpanel">
          <div class="row">
            <div class="col-md-12">
              <div class="card p-3">
                <div class="mb-2">
                  <label for="sqlDb">Base</label>
                  <select id="sqlDb" class="form-select">
                    <option value="stg">Staging</option>
                    <option value="dwh">DWH</option>
                  </select>
                </div>
                <div class="mb-2">
                  <label for="sqlText">SQL (solo SELECT permitido)</label>
                  <textarea id="sqlText" class="form-control" rows="6">SELECT * FROM stg_estudiante LIMIT 200</textarea>
                </div>
                <div class="d-flex gap-2">
                  <button id="runSql" class="btn btn-success">Ejecutar</button>
                  <button id="clearSql" class="btn btn-secondary">Limpiar</button>
                </div>
                <hr>
                <div id="sqlResult"></div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      async function fetchTables(){
        const r = await fetch('/api/tables');
        const j = await r.json();
        return j;
      }

      async function fetchSchema(db, table){
        const r = await fetch(`/api/schema?db=${db}&table=${table}`);
        return r.json();
      }

      async function fetchPreview(db, table){
        const r = await fetch(`/api/data?db=${db}&table=${table}&limit=50`);
        return r.json();
      }

      function fillSelect(el, items){
        el.innerHTML = '';
        for(const it of items) {
          const opt = document.createElement('option'); opt.value=it; opt.textContent=it; el.appendChild(opt);
        }
      }

      function renderPreview(rows){
        const preview = document.getElementById('preview');
        if(!rows || rows.length===0){ preview.innerHTML = '<i>Sin datos</i>'; return; }
        const cols = Object.keys(rows[0]);
        let html = '<div class="table-responsive"><table class="table table-sm table-striped"><thead><tr>' + cols.map(c=>`<th>${c}</th>`).join('') + '</tr></thead><tbody>';
        for(const r of rows){ html += '<tr>' + cols.map(c=>`<td>${String(r[c]===null? '': r[c])}</td>`).join('') + '</tr>'; }
        html += '</tbody></table></div>';
        preview.innerHTML = html;
      }

      document.addEventListener('DOMContentLoaded', async ()=>{
        const tables = await fetchTables();
        const dbSelect = document.getElementById('dbSelect');
        const tableSelect = document.getElementById('tableSelect');
        const xSelect = document.getElementById('xSelect');
        const ySelect = document.getElementById('ySelect');

        function loadTables(){
          const db = dbSelect.value;
          const list = db==='stg'? tables.stg : tables.dwh;
          fillSelect(tableSelect, list);
          tableSelect.dispatchEvent(new Event('change'));
        }

        dbSelect.addEventListener('change', loadTables);

        tableSelect.addEventListener('change', async ()=>{
          const db = dbSelect.value;
          const table = tableSelect.value;
          const schema = await fetchSchema(db, table);
          if(schema.error){ alert(schema.error); return; }
          const cols = schema.schema.map(c=>c.Field);
          fillSelect(xSelect, cols);
          const yopts = [''].concat(cols);
          fillSelect(ySelect, yopts);
          const preview = await fetchPreview(db, table);
          renderPreview(preview.rows);
        });

        document.getElementById('renderBtn').addEventListener('click', async ()=>{
          const db = dbSelect.value; const table = tableSelect.value; const x = xSelect.value; const y = ySelect.value; const chartType = document.getElementById('chartType').value;
          const body = {db, table, x, y, chart: chartType};
          const r = await fetch('/api/chart', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
          const j = await r.json();
          if(j.error){ alert(j.error); return; }
          const data = j.chart.data;
          if(!data || data.length===0){ document.getElementById('chart').innerHTML = '<i>No hay datos para graficar</i>'; return; }
          const xs = data.map(d=>d.x);
          const ys = data.map(d=>d.y);
          let plotdata;
          if(j.chart.type==='pie'){
            plotdata = [{labels: xs, values: ys, type:'pie'}];
          } else {
            plotdata = [{x: xs, y: ys, type: j.chart.type}];
          }
          Plotly.newPlot('chart', plotdata);
        });

        // SQL executor
        document.getElementById('runSql').addEventListener('click', async ()=>{
          const db = document.getElementById('sqlDb').value;
          const query = document.getElementById('sqlText').value;
          const r = await fetch('/api/sql', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({db, query, limit:1000})});
          const j = await r.json();
          const target = document.getElementById('sqlResult');
          if(j.error){ target.innerHTML = `<div class="alert alert-danger">${j.error}</div>`; return; }
          if(!j.rows || j.rows.length===0){ target.innerHTML = '<i>Sin resultados</i>'; return; }
          const cols = Object.keys(j.rows[0]);
          let html = '<div class="table-responsive"><table class="table table-sm table-striped"><thead><tr>' + cols.map(c=>`<th>${c}</th>`).join('') + '</tr></thead><tbody>';
          for(const r0 of j.rows){ html += '<tr>' + cols.map(c=>`<td>${String(r0[c]===null? '': r0[c])}</td>`).join('') + '</tr>'; }
          html += '</tbody></table></div>';
          target.innerHTML = html;
        });

        document.getElementById('clearSql').addEventListener('click', ()=>{ document.getElementById('sqlText').value=''; document.getElementById('sqlResult').innerHTML=''; });

        loadTables();
      });
    </script>
  </body>
</html>
