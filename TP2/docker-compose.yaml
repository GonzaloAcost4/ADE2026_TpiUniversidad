services:
  mysql_db:
    image: mysql:8.0
    container_name: db_universidad
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - ./1-ScriptCreacion_DB:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  pipeline_etl:
    build: .
    container_name: etl_proceso
    depends_on:
      mysql_db:
        condition: service_healthy
    volumes:
      - .:/app
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - PYTHONPATH=/app
    command: >
      sh -c "cd /app && python 2-ETL_CargaInicial/carga_staging.py && 
             python 3-ETL_Incremental/carga_incremental.py"
